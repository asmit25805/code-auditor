name: 🤖 Daily Code Audit

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run code auditor
        env:
          GITHUB_TOKEN:     ${{ secrets.GH_PAT }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save audit log back to repo
        if: always()
        run: |
          git config user.name "code-auditor-bot"
          git config user.email "bot@code-auditor"
          git add audit_log.db
          git diff --staged --quiet || git commit -m "chore: update audit log [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload audit log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-log
          path: audit_log.db
          retention-days: 90
